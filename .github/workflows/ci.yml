name: CI

on:
  push:
    branches: [main, restructure]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.13"

      - name: Install ironAPE and dependencies
        run: pip install -e ".[dev]"

      - name: Run tests
        run: pytest tests/ -v
